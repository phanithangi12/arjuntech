<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluence Support</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      height: 500px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background-color: #4CAF50;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 1.2em;
    }

    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background-color: #f9f9f9;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      max-width: 80%;
    }

    .user {
      background-color: #dcf8c6;
      align-self: flex-end;
    }

    .bot {
      background-color: #eee;
      align-self: flex-start;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 1em;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      background-color: #4CAF50;
      color: #fff;
      cursor: pointer;
      font-size: 1em;
    }

    .chat-input button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">Chatbot</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (message === "") return;

      appendMessage(message, 'user');
      input.value = '';

      // Simple bot response
      setTimeout(() => {
        const botReply = getBotResponse(message);
        appendMessage(botReply, 'bot');
      }, 500);
    }

    function getBotResponse(message) {
      const msg = message.toLowerCase();
      if (msg.includes('hello') || msg.includes('hi')) return "Hello! How can I help you today?";
      if (msg.includes('how are you')) return "I'm just a bot, but I'm doing great!";
      if (msg.includes('bye')) return "Goodbye! Have a nice day!";
      return "Sorry, I didn't understand that.";
    }
  </script>

				}
			);

		}
	};
</script>
<script type='text/javascript' src='https://na2btfluence--develop2.sandbox.my.site.com/ESWGithubWorktoService1772635404688/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>


</body>

</html>
